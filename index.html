<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>GR Revenue Intelligence</title>
<style>
:root {
  --purple: #7C3AED;
  --pink: #EC4899;
  --cyan: #06B6D4;
  --mint: #10B981;
  --yellow: #F59E0B;
  --red: #EF4444;
  --bg: #0B0F19;
  --bg-2: #141827;
  --bg-3: #1E2433;
  --border: #2A3142;
  --text: #F3F4F6;
  --text-dim: #9CA3AF;
  --text-mute: #6B7280;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

#app {
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px;
}

/* HEADER */
.hdr {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  background: linear-gradient(135deg, var(--purple), var(--pink));
  border-radius: 12px;
  margin-bottom: 16px;
}
.hdr-left { display: flex; align-items: center; gap: 14px; }
.logo {
  width: 42px; height: 42px;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 800;
}
.hdr-main { font-size: 18px; font-weight: 800; letter-spacing: 0.5px; }
.hdr-sub { font-size: 11px; opacity: 0.85; letter-spacing: 1px; text-transform: uppercase; }

.hdr-right { display: flex; align-items: center; gap: 12px; }
.live-badge {
  background: rgba(0,0,0,0.25);
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  display: flex; align-items: center; gap: 6px;
}
.dot {
  width: 8px; height: 8px;
  background: #10B981;
  border-radius: 50%;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.btn-refresh {
  background: rgba(0,0,0,0.25);
  border: none;
  color: white;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
}
.btn-refresh:hover { background: rgba(0,0,0,0.4); }
.timer { font-size: 11px; opacity: 0.8; font-variant-numeric: tabular-nums; }

/* TABS */
.tabs {
  display: flex;
  gap: 4px;
  background: var(--bg-2);
  padding: 6px;
  border-radius: 10px;
  margin-bottom: 16px;
  overflow-x: auto;
}
.tab {
  background: transparent;
  border: none;
  color: var(--text-dim);
  padding: 10px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  transition: all 0.15s;
}
.tab:hover { background: var(--bg-3); color: var(--text); }
.tab.active {
  background: linear-gradient(135deg, var(--purple), var(--pink));
  color: white;
}
.badge-red {
  background: var(--red);
  color: white;
  padding: 2px 7px;
  border-radius: 10px;
  font-size: 11px;
  margin-left: 6px;
}

/* PANELS */
.panel { display: none; }
.panel.active { display: block; }
.loading, .empty {
  padding: 60px 20px;
  text-align: center;
  color: var(--text-mute);
  font-size: 14px;
}
.error {
  padding: 20px;
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.3);
  border-radius: 8px;
  color: #FCA5A5;
  margin: 16px 0;
}

/* KPI CARDS */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 16px;
}
.kpi {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
}
.kpi-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 8px;
}
.kpi-value {
  font-size: 24px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
}
.kpi-sub {
  font-size: 12px;
  color: var(--text-mute);
  margin-top: 4px;
}
.kpi-purple { border-left: 3px solid var(--purple); }
.kpi-pink { border-left: 3px solid var(--pink); }
.kpi-cyan { border-left: 3px solid var(--cyan); }
.kpi-mint { border-left: 3px solid var(--mint); }
.kpi-yellow { border-left: 3px solid var(--yellow); }

/* AMPLEMARKET TAB */
.qd-star { color: #16a34a; font-weight: 600; }
.qd-copy { color: #ea580c; font-weight: 600; }
.qd-subj { color: #2563eb; font-weight: 600; }
.qd-bad { color: #dc2626; font-weight: 600; }
.qd-none { color: #9ca3af; }
.am-tab {
  padding: 8px 14px;
  background: #f3f4f6;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  color: #374151;
}
.am-tab:hover { background: #e5e7eb; }
.am-tab-active {
  background: #1e293b;
  color: white;
  border-color: #1e293b;
}

/* SECTIONS */
.section {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px;
  margin-bottom: 16px;
}
.section-title {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 14px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-count {
  background: var(--bg-3);
  color: var(--text-dim);
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
}

/* TABLES */
.tbl {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.tbl th {
  text-align: left;
  padding: 10px 8px;
  border-bottom: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 700;
}
.tbl td {
  padding: 10px 8px;
  border-bottom: 1px solid var(--border);
}
.tbl tr:last-child td { border-bottom: none; }
.tbl tr:hover td { background: var(--bg-3); }
.num { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }

/* TAGS */
.tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.tag-propuesta { background: rgba(124,58,237,0.2); color: #C4B5FD; }
.tag-educacion { background: rgba(6,182,212,0.2); color: #67E8F9; }
.tag-atraccion { background: rgba(236,72,153,0.2); color: #F9A8D4; }
.tag-won { background: rgba(16,185,129,0.2); color: #6EE7B7; }
.tag-perdida { background: rgba(107,114,128,0.2); color: #9CA3AF; }

/* ALERTS */
.alert {
  background: var(--bg-2);
  border-left: 4px solid var(--red);
  padding: 14px 16px;
  border-radius: 6px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 0.15s;
}
.alert:hover { background: var(--bg-3); }
.alert-crit { border-left-color: var(--red); }
.alert-imp { border-left-color: var(--yellow); }
.alert-op { border-left-color: var(--cyan); }
.alert-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.alert-title { font-weight: 700; font-size: 14px; }
.alert-badge {
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 10px;
  font-weight: 700;
  letter-spacing: 1px;
}
.alert-badge-crit { background: var(--red); color: white; }
.alert-badge-imp { background: var(--yellow); color: #78350F; }
.alert-badge-op { background: var(--cyan); color: #083344; }
.alert-meta {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 6px;
}
.alert-body {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  font-size: 13px;
  color: var(--text-dim);
  display: none;
}
.alert.open .alert-body { display: block; }

/* FILTERS */
.filters {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 14px;
  align-items: center;
}
.filter-label {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-right: 4px;
}
.chip {
  background: var(--bg-3);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 5px 12px;
  border-radius: 14px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
}
.chip:hover { color: var(--text); }
.chip.active {
  background: linear-gradient(135deg, var(--purple), var(--pink));
  color: white;
  border-color: transparent;
}

/* CLIENT CARDS */
.client-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 12px;
}
.client-card {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
}
.client-name {
  font-size: 16px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--purple), var(--pink));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}
.client-total {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 10px;
}
.client-contact {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 10px;
}
.client-deals { margin-top: 8px; }
.client-deal {
  font-size: 12px;
  padding: 6px 0;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
}

/* FOOTER */
.ftr {
  margin-top: 20px;
  padding: 12px 20px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text-mute);
}

/* URGENCIA */
.urg-row { background: rgba(239,68,68,0.08); }
.urg-row:hover td { background: rgba(239,68,68,0.15) !important; }
.atn-row { background: rgba(245,158,11,0.06); }

/* RESPONSIVE */
@media (max-width: 768px) {
  #app { padding: 12px; }
  .hdr { flex-direction: column; gap: 12px; align-items: flex-start; }
  .hdr-right { flex-wrap: wrap; }
  .kpi-value { font-size: 20px; }
  .tabs { padding: 4px; }
  .tab { padding: 8px 12px; font-size: 12px; }
}

/* KANBAN — Pipeline vertical por stage */
.kanban {
  display: grid;
  grid-template-columns: repeat(6, minmax(200px, 1fr));
  gap: 10px;
  margin-top: 12px;
  overflow-x: auto;
}
.kanban-col {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  min-width: 200px;
  display: flex;
  flex-direction: column;
}
.kanban-col-header {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-2);
  border-radius: 8px 8px 0 0;
}
.kanban-col-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.kanban-col-count {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
}
.kanban-col-body {
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-height: 70vh;
  overflow-y: auto;
}
.kanban-card {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
  transition: border-color 0.15s;
}
.kanban-card:hover {
  border-color: var(--brand);
}
.kanban-card-name {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 4px;
  line-height: 1.3;
  word-break: break-word;
}
.kanban-card-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-dim);
}
.kanban-card-amount {
  font-weight: 600;
  color: var(--text);
}
.kanban-card-owner {
  color: var(--text-mute);
  font-size: 10px;
}
.kanban-card-date {
  margin-top: 4px;
  font-size: 10px;
  color: var(--text-mute);
}
.kanban-date-late {
  color: #ef4444;
  font-weight: 600;
}
.kanban-empty {
  padding: 16px 8px;
  color: var(--text-mute);
  font-size: 11px;
  text-align: center;
}

@media (max-width: 1100px) {
  .kanban { grid-template-columns: repeat(3, minmax(200px, 1fr)); }
}
@media (max-width: 640px) {
  .kanban { grid-template-columns: repeat(2, minmax(180px, 1fr)); }
}

/* WON BUCKETS v10 */
.won-kpis {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}
.won-kpi {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  border-left: 3px solid var(--purple);
}
.won-kpi.renewal { border-left-color: var(--mint); }
.won-kpi.recurring { border-left-color: var(--cyan); }
.won-kpi.oneshot { border-left-color: var(--text-mute); }
.won-kpi-label { font-size: 11px; color: var(--text-dim); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 4px; }
.won-kpi-value { font-size: 22px; font-weight: 800; color: var(--text); }
.won-kpi-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

.won-bucket {
  margin-bottom: 20px;
}
.won-bucket-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 8px 8px 0 0;
  border-bottom: none;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}
.won-bucket-icon { font-size: 16px; }
.won-bucket-count {
  background: var(--bg-3);
  color: var(--text-dim);
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 700;
}
.won-bucket-total {
  margin-left: auto;
  font-size: 12px;
  color: var(--text-dim);
  font-weight: 500;
  text-transform: none;
  letter-spacing: 0;
}
.won-bucket-total strong { color: var(--text); font-weight: 700; }

.won-renewal-row {
  display: grid;
  grid-template-columns: 1fr 100px 120px 80px 100px;
  gap: 10px;
  padding: 10px 14px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-top: none;
  align-items: center;
  font-size: 13px;
}
.won-renewal-row:nth-child(even) { background: var(--bg-3); }
.won-renewal-row:last-child { border-radius: 0 0 8px 8px; }

.urg-bar {
  height: 6px;
  background: var(--bg-3);
  border-radius: 3px;
  overflow: hidden;
  position: relative;
  margin-top: 4px;
}
.urg-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.urg-bar-fill.vencida { background: var(--red); }
.urg-bar-fill.critica { background: var(--red); }
.urg-bar-fill.proxima { background: var(--yellow); }
.urg-bar-fill.visible { background: var(--mint); }

.urg-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.urg-badge.vencida { background: var(--red); color: white; }
.urg-badge.critica { background: var(--red); color: white; }
.urg-badge.proxima { background: var(--yellow); color: #78350F; }
.urg-badge.visible { background: rgba(16,185,129,0.15); color: var(--mint); border: 1px solid var(--mint); }

.won-deal-name { font-weight: 600; }
.won-deal-prod { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

.won-recurring-row {
  display: grid;
  grid-template-columns: 1fr 120px 100px 120px 100px;
  gap: 10px;
  padding: 12px 14px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-top: none;
  align-items: center;
  font-size: 13px;
}
.won-recurring-row:last-child { border-radius: 0 0 8px 8px; }

.dia-corte {
  background: var(--cyan);
  color: white;
  padding: 4px 10px;
  border-radius: 6px;
  font-weight: 700;
  font-size: 12px;
  text-align: center;
  min-width: 40px;
  display: inline-block;
}
.factura-status {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 10px;
  font-weight: 600;
}
.factura-status.vencida { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid var(--red); }
.factura-status.proxima { background: rgba(245,158,11,0.15); color: var(--yellow); border: 1px solid var(--yellow); }
.factura-status.ok { background: rgba(16,185,129,0.15); color: var(--mint); border: 1px solid var(--mint); }

.btn-action {
  background: var(--bg-3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
  text-align: center;
  transition: all 0.15s;
}
.btn-action:hover { background: var(--purple); border-color: var(--purple); }

.won-empty-bucket {
  padding: 20px 14px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 8px 8px;
  color: var(--text-mute);
  text-align: center;
  font-size: 12px;
  font-style: italic;
}

.num-right { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }
.days-cell { font-size: 11px; color: var(--text-dim); text-align: center; }
.days-cell strong { color: var(--text); font-size: 16px; display: block; }

</style>
</head>
<body>
<div id="app">
  <header class="hdr">
    <div class="hdr-left">
      <div class="logo">G</div>
      <div class="hdr-title">
        <div class="hdr-main">GREAT REVENUE</div>
        <div class="hdr-sub">Revenue Intelligence</div>
      </div>
    </div>
    <div class="hdr-right">
      <span class="live-badge"><span class="dot"></span> LIVE</span>
      <button id="btn-refresh" class="btn-refresh">↻ Actualizar</button>
      <span id="timer" class="timer">—</span>
    </div>
  </header>

  <nav class="tabs" id="tabs">
    <button class="tab active" data-tab="recap">Recap</button>
    <button class="tab" data-tab="overview">Overview</button>
    <button class="tab" data-tab="pipeline">Pipeline</button>
    <button class="tab" data-tab="won">Won</button>
    <button class="tab" data-tab="clientes">Clientes</button>
    <button class="tab" data-tab="pendientes">Pendientes</button>
    <button class="tab" data-tab="alertas">Alertas <span class="badge-red" id="alerts-count">—</span></button>
    <button class="tab" data-tab="amplemarket">Amplemarket</button>
    <button class="tab" data-tab="forecast">Forecast</button>
    <button class="tab" data-tab="chat">💬 Chat</button>
  </nav>

  <main id="panels">
    <section class="panel active" id="p-recap"><div class="loading">Cargando datos en vivo…</div></section>
    <section class="panel" id="p-overview"></section>
    <section class="panel" id="p-pipeline"></section>
    <section class="panel" id="p-won"></section>
    <section class="panel" id="p-clientes"></section>
    <section class="panel" id="p-pendientes"></section>
    <section class="panel" id="p-alertas"></section>
    <section class="panel" id="p-amplemarket"></section>
    <section class="panel" id="p-forecast"></section>
    <section class="panel" id="p-chat"></section>
  </main>

  <footer class="ftr">
    <span>GR Revenue Intelligence · HubSpot 49671716</span>
    <span id="ftr-deals">—</span>
  </footer>
</div>

<script>
/* GR Dashboard v11 - build: 2026-04-24T22:50 - Tab Amplemarket: 4 secciones (Semáforo + SEQ vs DUO + Alertas + Detalle expandible) */
// ============================================================
// GR REVENUE INTELLIGENCE DASHBOARD
// ============================================================
// Fetches live data from n8n webhook and renders 9 tabs.
// Hard-coded operational knowledge (team, clients, alerts) is
// defined as JS constants — not fetched — because that data
// lives in people's heads, not in HubSpot.

// --- Utilities ---
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => Array.from(document.querySelectorAll(sel));

function fmt(n) {
  if (n == null || isNaN(n)) return '—';
  return '$' + Math.round(n).toLocaleString('en-US');
}

function fmtK(n) {
  if (n == null || isNaN(n)) return '—';
  if (Math.abs(n) >= 1000000) return '$' + (n / 1000000).toFixed(2) + 'M';
  if (Math.abs(n) >= 1000) return '$' + Math.round(n / 1000) + 'K';
  return '$' + Math.round(n);
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  const now = new Date();
  return Math.floor((d - now) / (1000 * 60 * 60 * 24));
}

function tagForStage(stage, stageLabel) {
  // Prefer the label from the webhook (handles custom stage IDs correctly)
  const map = {
    presentationscheduled: 'tag-propuesta',
    qualifiedtobuy: 'tag-educacion',
    appointmentscheduled: 'tag-atraccion',
    closedwon: 'tag-won',
    decisionmakerboughtin: 'tag-won',
    '1332596061': 'tag-atraccion',    // Señal Detectada
    '1332596062': 'tag-atraccion',    // Reply
    '1332596063': 'tag-atraccion',    // Contactado
    '1332596064': 'tag-educacion',    // En Conv.
    '1092009814': 'tag-perdida'       // Perdida
  };
  const cls = map[stage] || 'tag-perdida';
  const label = stageLabel || stage || '—';
  return `<span class="tag ${cls}">${label}</span>`;
}

// --- Data fetch ---
async function loadData() {
  try {
    // Fetch principal v10 + AM v1 en paralelo
    const [dealsRes, amRes] = await Promise.all([
      fetch(DATA_URL),
      fetch(AM_URL + '?period=' + amPeriod).catch(e => { console.warn('AM endpoint failed:', e); return null; })
    ]);

    if (!dealsRes.ok) throw new Error('HTTP ' + dealsRes.status);
    DATA = await dealsRes.json();
    if (!DATA.ok) throw new Error('Webhook returned ok:false');

    // AM data es opcional — si falla el dashboard sigue funcionando
    if (amRes && amRes.ok) {
      try {
        AM_DATA = await amRes.json();
      } catch (e) {
        console.warn('AM data parse failed:', e);
        AM_DATA = null;
      }
    }

    // Tasks ahora vienen del mismo webhook en DATA.tareas/DATA.statsTareas
    // Adaptamos al shape que espera el renderer: { tareas, statsTareas }
    TASKS = {
      tareas: DATA.tareas || {},
      statsTareas: DATA.statsTareas || {}
    };

    updateTimer();
    updateFooter();
    renderCurrentTab();
  } catch (err) {
    console.error('Load error:', err);
    $('#p-recap').innerHTML = `<div class="error">
      Error cargando datos: ${err.message}<br>
      <small>URL: ${DATA_URL}</small>
    </div>`;
  }
}

function updateTimer() {
  const d = new Date(DATA.generadoEn);
  $('#timer').textContent = d.toLocaleString('es-MX', {
    hour: '2-digit', minute: '2-digit', day: '2-digit', month: 'short'
  });
}

function updateFooter() {
  $('#ftr-deals').textContent = DATA.deals.length + ' deals live';
}

// --- Tab routing ---
function switchTab(tabId) {
  currentTab = tabId;
  $$('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabId));
  $$('.panel').forEach(p => p.classList.toggle('active', p.id === 'p-' + tabId));
  renderCurrentTab();
}

function renderCurrentTab() {
  if (!DATA) return;
  const renderers = {
    recap: renderRecap,
    overview: renderOverview,
    pipeline: renderPipeline,
    won: renderWon,
    clientes: renderClientes,
    pendientes: renderPendientes,
    alertas: renderAlertas,
    amplemarket: renderAmplemarket,
    forecast: renderForecast,
    chat: renderChat
  };
  const fn = renderers[currentTab];
  if (fn) fn();
}

    filteredMov.sort((a,b) => (b.lastMod||'').localeCompare(a.lastMod||''));

// --- PIPELINE ---
// Orden de stages para Kanban (columnas de izquierda a derecha)
const STAGE_ORDER = [
  { key: '1332596061', label: 'Señal',      id: '1332596061' },
  { key: '1332596062', label: 'Reply',      id: '1332596062' },
  { key: '1332596063', label: 'Contactado', id: '1332596063' },
  { key: '1332596064', label: 'En Conv.',   id: '1332596064' },
  { key: 'appointmentscheduled', label: 'Atracción', id: 'appointmentscheduled' },
  { key: 'qualifiedtobuy', label: 'Educación', id: 'qualifiedtobuy' },
  { key: 'presentationscheduled', label: 'Propuesta', id: 'presentationscheduled' },
  { key: 'decisionmakerboughtin', label: 'Aprobación', id: 'decisionmakerboughtin' }
];

function renderPipeline() {
  const prods = ['ALL', ...new Set(DATA.deals.map(d => d.prod).filter(Boolean))];
  const owners = ['ALL', ...new Set(DATA.deals.map(d => d.owner).filter(Boolean))];

  const filtered = DATA.deals.filter(d => {
    if (pipelineFilters.prod !== 'ALL' && d.prod !== pipelineFilters.prod) return false;
    if (pipelineFilters.owner !== 'ALL' && d.owner !== pipelineFilters.owner) return false;
    if (pipelineFilters.excludeP && d.name.startsWith('P_')) return false;
    // Excluir Closed Won y Perdida del Kanban de pipeline activo
    if (d.stage === 'closedwon' || d.stage === '1092009814') return false;
    return true;
  });

  const total = filtered.reduce((s, d) => s + (d.amount || 0), 0);

  // Agrupar por stage
  const byStage = {};
  STAGE_ORDER.forEach(s => byStage[s.key] = []);
  const otros = [];
  filtered.forEach(d => {
    const key = STAGE_ORDER.find(s => s.id === d.stage)?.key;
    if (key) byStage[key].push(d);
    else otros.push(d);
  });
  // Ordenar dentro de cada columna por monto descendente
  Object.values(byStage).forEach(arr => arr.sort((a, b) => (b.amount || 0) - (a.amount || 0)));
  otros.sort((a, b) => (b.amount || 0) - (a.amount || 0));

  let html = `
    <div class="section">
      <div class="filters">
        <span class="filter-label">Producto:</span>
        ${prods.map(p => `<button class="chip ${pipelineFilters.prod === p ? 'active' : ''}" data-pfilter="prod" data-pval="${p}">${p}</button>`).join('')}
      </div>
      <div class="filters">
        <span class="filter-label">Owner:</span>
        ${owners.map(o => `<button class="chip ${pipelineFilters.owner === o ? 'active' : ''}" data-pfilter="owner" data-pval="${o}">${o}</button>`).join('')}
        <button class="chip ${pipelineFilters.excludeP ? 'active' : ''}" data-pfilter="excludeP" data-pval="toggle">Excluir P_</button>
      </div>
      <div class="section-title">
        <span class="section-count">${filtered.length} deals activos</span>
        <span style="margin-left:auto;color:var(--text-dim);font-size:12px;">Total: <strong style="color:var(--text);">${fmtK(total)}</strong></span>
      </div>
      <div class="kanban">
  `;

  STAGE_ORDER.forEach(s => {
    const col = byStage[s.key];
    const colTotal = col.reduce((sum, d) => sum + (d.amount || 0), 0);
    html += `
      <div class="kanban-col">
        <div class="kanban-col-header">
          <div class="kanban-col-title">${s.label}</div>
          <div class="kanban-col-count">${col.length} · ${fmtK(colTotal)}</div>
        </div>
        <div class="kanban-col-body">
    `;
    if (col.length === 0) {
      html += `<div class="kanban-empty">—</div>`;
    } else {
      col.slice(0, 40).forEach(d => {
        const days = d.closedate ? daysUntil(d.closedate) : null;
        const dateClass = days !== null && days < 0 ? 'kanban-date-late' : '';
        const clienteDisplay = d.cliente || d.name;
        const subtitleHtml = d.cliente && d.cliente !== d.name
          ? `<div class="kanban-card-sub" style="font-size:10px;color:var(--text-dim);margin-top:2px;">${d.name}</div>`
          : '';
        html += `
          <div class="kanban-card">
            <div class="kanban-card-name">${clienteDisplay}</div>
            ${subtitleHtml}
            <div class="kanban-card-meta">
              <span class="kanban-card-amount">${fmtK(d.amount)}</span>
              <span class="kanban-card-owner">${d.owner || '—'}</span>
            </div>
            ${d.closedate ? `<div class="kanban-card-date ${dateClass}">${d.closedate}</div>` : ''}
          </div>
        `;
      });
      if (col.length > 40) {
        html += `<div class="kanban-empty">+ ${col.length - 40} más</div>`;
      }
    }
    html += `</div></div>`;
  });

  html += `</div>`;

  if (otros.length > 0) {
    html += `<div class="section-title" style="margin-top:20px;">Otros stages <span class="section-count">${otros.length}</span></div>
      <table class="tbl"><thead><tr><th>Deal</th><th>Stage</th><th>Owner</th><th>Close</th><th class="num">Monto</th></tr></thead><tbody>`;
    otros.slice(0, 20).forEach(d => {
      html += `<tr>
        <td>${d.name}</td>
        <td>${tagForStage(d.stage, d.stageLabel)}</td>
        <td>${d.owner || '—'}</td>
        <td>${d.closedate || '—'}</td>
        <td class="num">${fmt(d.amount)}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }

  html += `</div>`;
  $('#p-pipeline').innerHTML = html;

  $$('[data-pfilter]').forEach(btn => {
    btn.addEventListener('click', () => {
      const f = btn.dataset.pfilter;
      const v = btn.dataset.pval;
      if (f === 'excludeP') pipelineFilters.excludeP = !pipelineFilters.excludeP;
      else pipelineFilters[f] = v;
      renderPipeline();
    });
  });
}

// --- WON ---
function renderWon() {
  // v10: Consume wonBuckets si está disponible, fallback a won[] plano
  const wb = DATA.wonBuckets || null;
  const statsWon = DATA.statsWon || null;

  // Fallback: si no hay wonBuckets (API v9 o antes), usar renderWon legacy
  if (!wb || !statsWon) {
    return renderWonLegacy();
  }

  const renovaciones = wb.renovacionesAnuales || [];
  const consultorias = wb.consultoriasMensuales || [];
  const historico = wb.historicoWon || [];

  const recurrenteAnual = statsWon.renovacionesAnuales.montoTotal + statsWon.consultoriasMensuales.montoAnual;

  // Día actual del mes para calcular status de factura
  const today = new Date();
  const diaHoy = today.getDate();

  let html = '';

  // === KPIs agregados arriba ===
  html += `
    <div class="won-kpis">
      <div class="won-kpi renewal">
        <div class="won-kpi-label">💰 Revenue Recurrente Anual</div>
        <div class="won-kpi-value">${fmtK(recurrenteAnual)}</div>
        <div class="won-kpi-sub">${fmtK(statsWon.renovacionesAnuales.montoTotal)} anuales + ${fmtK(statsWon.consultoriasMensuales.montoAnual)} consultorías</div>
      </div>
      <div class="won-kpi recurring">
        <div class="won-kpi-label">📅 Renovaciones críticas</div>
        <div class="won-kpi-value">${statsWon.renovacionesAnuales.vencidas + statsWon.renovacionesAnuales.criticas}</div>
        <div class="won-kpi-sub">Vencen en ≤60 días · ${statsWon.renovacionesAnuales.proximas} próximas (≤90d)</div>
      </div>
      <div class="won-kpi oneshot">
        <div class="won-kpi-label">💵 Monto mensual recurrente</div>
        <div class="won-kpi-value">${fmtK(statsWon.consultoriasMensuales.montoMensual)}</div>
        <div class="won-kpi-sub">${statsWon.consultoriasMensuales.count} consultorías activas</div>
      </div>
    </div>
  `;

  // === BUCKET 1: Renovaciones Anuales ===
  html += `
    <div class="won-bucket">
      <div class="won-bucket-header">
        <span class="won-bucket-icon">📅</span>
        <span>Renovaciones Anuales</span>
        <span class="won-bucket-count">${renovaciones.length}</span>
        <span class="won-bucket-total">Total: <strong>${fmtK(statsWon.renovacionesAnuales.montoTotal)}</strong></span>
      </div>
  `;

  if (renovaciones.length === 0) {
    html += `<div class="won-empty-bucket">Sin renovaciones anuales activas</div>`;
  } else {
    // Calcular % barra (días restantes como % de 365)
    renovaciones.forEach(d => {
      const days = d.diasParaVencer;
      // Barra: 100% cuando vencida/crítica, decrece conforme se aleja
      let barPct;
      if (days < 0) barPct = 100;
      else if (days <= 60) barPct = 100 - (days / 60 * 20); // 100-80%
      else if (days <= 90) barPct = 80 - ((days - 60) / 30 * 20); // 80-60%
      else if (days <= 180) barPct = 60 - ((days - 90) / 90 * 30); // 60-30%
      else barPct = Math.max(10, 30 - ((days - 180) / 180 * 20)); // 30-10%

      const daysDisplay = days < 0 ? `${Math.abs(days)}d vencida` : `${days}d`;
      const dealId = d.id || '';
      const hsUrl = dealId ? `https://app.hubspot.com/contacts/49671716/record/0-3/${dealId}` : '#';

      html += `
        <div class="won-renewal-row">
          <div>
            <div class="won-deal-name">${d.name}</div>
            <div class="won-deal-prod">${d.prod || ''} · ${d.owner || '—'} · Vence ${d.closedate || '—'}</div>
            <div class="urg-bar"><div class="urg-bar-fill ${d.urgencia}" style="width:${barPct}%"></div></div>
          </div>
          <div class="days-cell">
            <strong>${days < 0 ? Math.abs(days) : days}</strong>
            <span>${days < 0 ? 'días venc' : 'días'}</span>
          </div>
          <div><span class="urg-badge ${d.urgencia}">${d.urgencia}</span></div>
          <div class="num-right">${fmtK(d.amount)}</div>
          <div style="text-align:center;">
            <a class="btn-action" href="${hsUrl}" target="_blank">Ver deal →</a>
          </div>
        </div>
      `;
    });
  }
  html += `</div>`;

  // === BUCKET 2: Consultorías Mensuales ===
  html += `
    <div class="won-bucket">
      <div class="won-bucket-header">
        <span class="won-bucket-icon">💰</span>
        <span>Consultorías Mensuales</span>
        <span class="won-bucket-count">${consultorias.length}</span>
        <span class="won-bucket-total">${fmtK(statsWon.consultoriasMensuales.montoMensual)}/mes · <strong>${fmtK(statsWon.consultoriasMensuales.montoAnual)}/año</strong></span>
      </div>
  `;

  if (consultorias.length === 0) {
    html += `<div class="won-empty-bucket">Sin consultorías mensuales activas</div>`;
  } else {
    consultorias.forEach(d => {
      const diaCorte = d.diaCorte || 1;
      // Días hasta próximo corte
      let diasProxCorte;
      if (diaHoy <= diaCorte) {
        diasProxCorte = diaCorte - diaHoy;
      } else {
        // ya pasó este mes, calcular días del próximo
        const proxCorte = new Date(today.getFullYear(), today.getMonth() + 1, diaCorte);
        diasProxCorte = Math.ceil((proxCorte - today) / (1000 * 60 * 60 * 24));
      }

      // Status factura del mes actual:
      // - Si hoy >= diaCorte: factura debió emitirse (vencida si no se emitió)
      // - Si hoy < diaCorte: OK pendiente
      let facturaStatus, facturaText;
      if (diaHoy >= diaCorte) {
        const diasVencido = diaHoy - diaCorte;
        facturaStatus = diasVencido > 0 ? 'vencida' : 'proxima';
        facturaText = diasVencido === 0 ? 'Hoy' : `${diasVencido}d vencida`;
      } else {
        facturaStatus = 'ok';
        facturaText = `Pendiente`;
      }

      const dealId = d.id || '';
      const hsUrl = dealId ? `https://app.hubspot.com/contacts/49671716/record/0-3/${dealId}` : '#';

      html += `
        <div class="won-recurring-row">
          <div>
            <div class="won-deal-name">${d.name}</div>
            <div class="won-deal-prod">${d.prod || '3V'} · ${d.owner || '—'} · Contrato hasta ${d.closedate || '—'}</div>
          </div>
          <div style="text-align:center;">
            <span class="dia-corte">Día ${diaCorte}</span>
            <div class="won-deal-prod" style="margin-top:4px;">próx corte en ${diasProxCorte}d</div>
          </div>
          <div style="text-align:center;">
            <span class="factura-status ${facturaStatus}">${facturaText}</span>
          </div>
          <div class="num-right">
            ${fmt(d.amount)}/mes
            <div class="won-deal-prod" style="text-align:right;">${fmtK(d.amount * 12)}/año</div>
          </div>
          <div style="text-align:center;">
            <a class="btn-action" href="${hsUrl}" target="_blank">Ver deal →</a>
          </div>
        </div>
      `;
    });
  }
  html += `</div>`;

  // === BUCKET 3: Histórico Won (one-shot projects) ===
  html += `
    <div class="won-bucket">
      <div class="won-bucket-header">
        <span class="won-bucket-icon">📊</span>
        <span>Histórico Won</span>
        <span class="won-bucket-count">${historico.length}</span>
        <span class="won-bucket-total">Proyectos one-shot · Total: <strong>${fmtK(statsWon.historicoWon.montoTotal)}</strong></span>
      </div>
  `;

  if (historico.length === 0) {
    html += `<div class="won-empty-bucket">Sin proyectos one-shot cerrados</div>`;
  } else {
    html += `<table class="tbl" style="border-radius:0 0 8px 8px;"><thead><tr><th>Deal</th><th>Producto</th><th>Owner</th><th>Cierre</th><th class="num">Monto</th></tr></thead><tbody>`;
    historico.forEach(d => {
      const dealId = d.id || '';
      const hsUrl = dealId ? `https://app.hubspot.com/contacts/49671716/record/0-3/${dealId}` : '#';
      html += `<tr>
        <td><strong>${d.cliente || d.name}</strong><br><small style="color:var(--text-dim);">${d.name}</small></td>
        <td>${d.prod || '—'}</td>
        <td>${d.owner || '—'}</td>
        <td>${d.closedate || '—'}</td>
        <td class="num">${fmt(d.amount)}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }
  html += `</div>`;

  $('#p-won').innerHTML = html;
}

// --- PENDIENTES ---
function renderPendientes() {
  if (!TASKS || !TASKS.tareas) {
    $('#p-pendientes').innerHTML = `
      <div class="section">
        <div class="section-title">Pendientes por Persona</div>
        <div class="empty">No hay tareas disponibles desde el webhook.<br><small>Aprieta "Actualizar" o verifica que n8n esté activo.</small></div>
      </div>
    `;
    return;
  }

  const personas = Object.keys(TASKS.tareas);
  const current = pendientesFilters.persona;

  // Filter tasks based on current filters
  let filtered = [];
  if (current === 'Todos') {
    personas.forEach(p => {
      TASKS.tareas[p].forEach(t => filtered.push({ ...t, persona: p }));
    });
  } else {
    filtered = (TASKS.tareas[current] || []).map(t => ({ ...t, persona: current }));
  }

  if (pendientesFilters.urgency !== 'ALL') {
    filtered = filtered.filter(t => t.urgency === pendientesFilters.urgency);
  }
  if (pendientesFilters.scope === 'CLIENTE') {
    filtered = filtered.filter(t => !t.isInternal);
  } else if (pendientesFilters.scope === 'GR_INTERNO') {
    filtered = filtered.filter(t => t.isInternal && /^(GR|INT)/i.test((t.title || '').toUpperCase().trim()));
  } else if (pendientesFilters.scope === 'PT_INTERNO') {
    filtered = filtered.filter(t => t.isInternal && /^PT/i.test((t.title || '').toUpperCase().trim()));
  } else if (pendientesFilters.scope === 'INTERNO_TODO') {
    filtered = filtered.filter(t => t.isInternal);
  }

  // dealStages viene precalculado del backend v15 (con aliases). No recalcular.
  // Aplicar filtro por stage si está activo
  if (pendientesFilters.stage && pendientesFilters.stage !== 'ALL') {
    if (pendientesFilters.stage === 'SIN_DEAL') {
      filtered = filtered.filter(t => !t.dealStages || t.dealStages.length === 0);
    } else {
      filtered = filtered.filter(t => t.dealStages && t.dealStages.includes(pendientesFilters.stage));
    }
  }

  // Re-sort por opción elegida
  const sortMode = pendientesFilters.sort || 'urgency';
  filtered.sort((a, b) => {
    if (sortMode === 'date_asc') {
      return (a.date || '9999').localeCompare(b.date || '9999');
    }
    if (sortMode === 'date_desc') {
      return (b.date || '0000').localeCompare(a.date || '0000');
    }
    // default: urgency
    const order = { vencida: 0, hoy: 1, proxima: 2, semana: 3, futuro: 4, sinfecha: 5 };
    const ua = order[a.urgency] ?? 6;
    const ub = order[b.urgency] ?? 6;
    if (ua !== ub) return ua - ub;
    return (a.date || '9999').localeCompare(b.date || '9999');
  });

  // Stats card
  const s = TASKS.statsTareas || { total: 0, vencidas: 0, hoy: 0, proximas: 0, personas: {} };
  let html = `
    <div class="kpi-grid">
      <div class="kpi kpi-purple">
        <div class="kpi-label">Total Pendientes</div>
        <div class="kpi-value">${s.total}</div>
        <div class="kpi-sub">en HubSpot</div>
      </div>
      <div class="kpi kpi-pink" style="border-left-color: var(--red);">
        <div class="kpi-label">Vencidas</div>
        <div class="kpi-value" style="color:#FCA5A5;">${s.vencidas}</div>
        <div class="kpi-sub">requieren atención</div>
      </div>
      <div class="kpi kpi-yellow">
        <div class="kpi-label">Hoy</div>
        <div class="kpi-value">${s.hoy}</div>
        <div class="kpi-sub">cerrar hoy</div>
      </div>
      <div class="kpi kpi-cyan">
        <div class="kpi-label">Próximas (3d)</div>
        <div class="kpi-value">${s.proximas}</div>
        <div class="kpi-sub">planear</div>
      </div>
    </div>
  `;

  // Persona filter
  html += `<div class="section">
    <div class="filters">
      <span class="filter-label">Persona:</span>
      <button class="chip ${current === 'Todos' ? 'active' : ''}" data-pendfilter="persona" data-pval="Todos">Todos (${s.total})</button>
      ${personas.map(p => `
        <button class="chip ${current === p ? 'active' : ''}" data-pendfilter="persona" data-pval="${p}">${p} (${s.personas[p] || 0})</button>
      `).join('')}
    </div>
    <div class="filters">
      <span class="filter-label">Urgencia:</span>
      <button class="chip ${pendientesFilters.urgency === 'ALL' ? 'active' : ''}" data-pendfilter="urgency" data-pval="ALL">Todas</button>
      <button class="chip ${pendientesFilters.urgency === 'vencida' ? 'active' : ''}" data-pendfilter="urgency" data-pval="vencida" style="color:#FCA5A5;">🔴 Vencidas</button>
      <button class="chip ${pendientesFilters.urgency === 'hoy' ? 'active' : ''}" data-pendfilter="urgency" data-pval="hoy">🟡 Hoy</button>
      <button class="chip ${pendientesFilters.urgency === 'proxima' ? 'active' : ''}" data-pendfilter="urgency" data-pval="proxima">🟢 Próximas</button>
    </div>
    <div class="filters">
      <span class="filter-label">Scope:</span>
      <button class="chip ${pendientesFilters.scope === 'ALL' ? 'active' : ''}" data-pendfilter="scope" data-pval="ALL">Todo</button>
      <button class="chip ${pendientesFilters.scope === 'CLIENTE' ? 'active' : ''}" data-pendfilter="scope" data-pval="CLIENTE">Solo Cliente</button>
      <button class="chip ${pendientesFilters.scope === 'GR_INTERNO' ? 'active' : ''}" data-pendfilter="scope" data-pval="GR_INTERNO">Solo GR Interno</button>
      <button class="chip ${pendientesFilters.scope === 'PT_INTERNO' ? 'active' : ''}" data-pendfilter="scope" data-pval="PT_INTERNO">Solo PT Interno</button>
      <button class="chip ${pendientesFilters.scope === 'INTERNO_TODO' ? 'active' : ''}" data-pendfilter="scope" data-pval="INTERNO_TODO">Todo Interno</button>
    </div>
    <div class="filters">
      <span class="filter-label">Stage del deal:</span>
      <button class="chip ${(pendientesFilters.stage||'ALL') === 'ALL' ? 'active' : ''}" data-pendfilter="stage" data-pval="ALL">Todos</button>
      ${['Señal','Reply','Contactado','En Conv.','Atracción','Educación','Propuesta','Aprobación','Won'].map(st => `
        <button class="chip ${pendientesFilters.stage === st ? 'active' : ''}" data-pendfilter="stage" data-pval="${st}">${st}</button>

      <button class="chip ${pendientesFilters.stage === 'SIN_DEAL' ? 'active' : ''}" data-pendfilter="stage" data-pval="SIN_DEAL" style="color:var(--text-dim);">Sin deal</button>
    </div>
    <div class="filters">
      <span class="filter-label">Ordenar por:</span>
      <button class="chip ${sortMode === 'urgency' ? 'active' : ''}" data-pendfilter="sort" data-pval="urgency">🎯 Urgencia</button>
      <button class="chip ${sortMode === 'date_asc' ? 'active' : ''}" data-pendfilter="sort" data-pval="date_asc">📅 Fecha ↑ (más antigua)</button>

        <th>Fecha</th>

      vencida: '🔴',

      proxima: '🟢',
      semana: '⚪',
      futuro: '⚪',
      sinfecha: '⚫'
    }[t.urgency] || '⚫';
    const rowClass = t.urgency === 'vencida' ? 'urg-row' : (t.urgency === 'hoy' ? 'atn-row' : '');
    const prioTag = t.priority === 'HIGH' ? '<span class="tag tag-propuesta">HIGH</span>' :
                    t.priority === 'LOW' ? '<span class="tag tag-perdida">LOW</span>' : '';
    const scopeTag = t.isInternal
      ? (/^PT/i.test((t.title || '').trim())
          ? '<span class="tag tag-atraccion" style="margin-left:4px;background:rgba(99,102,241,.15);color:#A5B4FC;">PT</span>'
          : '<span class="tag tag-atraccion" style="margin-left:4px;">GR</span>')
      : '';
    const stageBadges = (t.dealStages || []).slice(0, 2).map(st =>
      `<span class="tag tag-atraccion" style="margin-left:4px;font-size:10px;">${st}</span>`
    ).join('');
    html += `<tr class="${rowClass}">
      <td>${urgColor}</td>
      <td>${t.title} ${prioTag} ${scopeTag}</td>
      <td><small>${t.client || '—'}</small>${stageBadges}</td>
      ${current === 'Todos' ? `<td><strong>${t.persona}</strong></td>` : ''}
      <td><small>${t.type || '—'}</small></td>
      <td><small>${t.date || '—'}</small></td>
    </tr>`;
  });

  html += `</tbody></table>`;
  if (filtered.length > 150) {
    html += `<div class="empty" style="padding:12px;font-size:11px;">Mostrando 150 de ${filtered.length} · Filtrá para ver más</div>`;
  }
  html += `<div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border);font-size:11px;color:var(--text-mute);">
    Fuente: HubSpot (live) · Actualizado: ${DATA && DATA.generadoEn ? new Date(DATA.generadoEn).toLocaleString('es-MX') : '—'}
  </div>`;
  html += `</div>`;

  $('#p-pendientes').innerHTML = html;

  $$('[data-pendfilter]').forEach(btn => {
    btn.addEventListener('click', () => {
      const f = btn.dataset.pendfilter;
      pendientesFilters[f] = btn.dataset.pval;
      renderPendientes();
    });
  });
}

// Mapeo ownerId → persona (igual que en backend)
function ownerIdToPersona(ownerId) {
  if (ownerId === '82004391') return 'Martha';
  if (ownerId === '77808624') return 'Migue';
  return 'Otro';
}

function applyAlertasFilters(alertas) {
  let filtered = alertas.slice();

  if (alertasFilters.accion !== 'ALL') {
    filtered = filtered.filter(a => a.accion === alertasFilters.accion);
  }
  if (alertasFilters.categoria !== 'ALL') {
    filtered = filtered.filter(a => a.categoria === alertasFilters.categoria);
  }
  if (alertasFilters.persona !== 'Todos') {
    filtered = filtered.filter(a => {
      const p = ownerIdToPersona(String(a.ownerId || ''));
      return p === alertasFilters.persona || a.owner === alertasFilters.persona;
    });
  }
  if (alertasFilters.producto !== 'ALL') {
    filtered = filtered.filter(a => a.prod === alertasFilters.producto);
  }
  if (alertasFilters.stage !== 'ALL') {
    filtered = filtered.filter(a => a.stage === alertasFilters.stage);
  }
  if (alertasFilters.minMonto > 0) {
    filtered = filtered.filter(a => (a.amount || 0) >= alertasFilters.minMonto);
  }

  // Sort
  const sortMode = alertasFilters.sort || 'monto_desc';
  filtered.sort((a, b) => {
    if (sortMode === 'monto_desc') return (b.amount || 0) - (a.amount || 0);
    if (sortMode === 'dias_desc') return (b.days || 0) - (a.days || 0);
    if (sortMode === 'urgencia') {
      // Cerrar > ReActivar > Higienizar
      const order = { Cerrar: 0, ReActivar: 1, Higienizar: 2 };
      const c = (order[a.categoria] || 9) - (order[b.categoria] || 9);
      if (c !== 0) return c;
      return (b.amount || 0) - (a.amount || 0);
    }
    return 0;
  });

  return filtered;
}

function fmtPct(v) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  // If rate > 100%, it means opens are from leads enrolled before the period — show — instead of misleading 200%+
  if (Number(v) > 1.0) return '—';
  return (Number(v) * 100).toFixed(1) + '%';
}
function fmtNum(v) {
  if (v === null || v === undefined) return '—';
  return Number(v).toLocaleString('en-US');
}
function freshness(iso) {
  if (!iso) return 'sin datos';
  const days = Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
  const hours = Math.floor((Date.now() - new Date(iso).getTime()) / 3600000);
  if (hours < 1) return 'hace minutos';
  if (hours < 24) return `hace ${hours}h`;
  if (days === 1) return 'hace 1 día';
  if (days < 7) return `hace ${days} días`;
  return `hace ${Math.floor(days / 7)} sem`;
}
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${d.getDate()} ${months[d.getMonth()]}`;
}

    const isPeriodMissing = am && am.periodoNoDisponible;
    const message = isPeriodMissing 
      ? `Snapshot de ${amPeriod}d no disponible. Pide a Claude actualizar Amplemarket.`
      : 'No hay snapshot disponible aún.';
    $('#p-amplemarket').innerHTML = `
      <div class="section" style="margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
          <span style="font-size:13px;color:var(--text-dim);font-weight:600">Periodo:</span>
          <button onclick="setAmPeriod(7)" class="chip" style="${amPeriod===7?'background:var(--purple);color:white;border-color:var(--purple)':''}">7 días</button>
          <button onclick="setAmPeriod(15)" class="chip" style="${amPeriod===15?'background:var(--purple);color:white;border-color:var(--purple)':''}">15 días</button>
          <button onclick="setAmPeriod(30)" class="chip" style="${amPeriod===30?'background:var(--purple);color:white;border-color:var(--purple)':''}">30 días</button>
        </div>
        <div class="section-title">📡 Amplemarket — Snapshot pendiente</div>
        <div style="padding:32px;text-align:center;background:var(--bg-3);border:1px solid var(--border);border-radius:8px">
          <div style="font-size:48px;margin-bottom:12px">⏳</div>
          <div style="font-size:16px;font-weight:600;margin-bottom:8px;color:var(--text)">${message}</div>
          <div style="color:var(--text-dim);margin-bottom:16px">${isPeriodMissing ? 'El backend funciona pero falta el snapshot de este periodo.' : 'El backend está activo pero el static data está vacío.'}</div>
          <code style="background:var(--bg-3);padding:6px 12px;border-radius:4px;display:inline-block;color:var(--purple);border:1px solid var(--border)">"actualizar Amplemarket"</code>
        </div>
      </div>
    `;
    return;
  }

  const k = am.kpis || {};
  const productos = am.productos || [];
  const accionables = am.accionables || [];
  const totales = am.totales || {};
  const stats = am.stats || {};

  let h = `
    <div class="section" style="margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
        <span style="font-size:13px;color:var(--text-dim);font-weight:600">Periodo:</span>
        <button onclick="setAmPeriod(7)" class="chip" style="${amPeriod===7?'background:var(--purple);color:white;border-color:var(--purple)':''}">7 días</button>
        <button onclick="setAmPeriod(15)" class="chip" style="${amPeriod===15?'background:var(--purple);color:white;border-color:var(--purple)':''}">15 días</button>
        <button onclick="setAmPeriod(30)" class="chip" style="${amPeriod===30?'background:var(--purple);color:white;border-color:var(--purple)':''}">30 días</button>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:14px">
        <div>
          <div style="font-size:18px;font-weight:700;color:var(--text)">📡 Amplemarket — Últimos ${am.periodoDias || amPeriod} días</div>
          <div style="font-size:12px;color:var(--text-dim);margin-top:2px">
            ${am.periodoDesde || '—'} → ${am.periodoHasta || '—'} · 
            Generado <strong style="color:var(--text)">${freshness(am.generadoEn)}</strong> · 
            ${totales.seqSecuencias || 0} secuencias · ${totales.duoSignals || 0} señales DUO
          </div>
        </div>
        <button onclick="refreshAmplemarket()" style="background:linear-gradient(135deg,var(--purple),var(--pink));color:white;border:0;border-radius:8px;padding:8px 14px;font-weight:600;font-size:13px;cursor:pointer">
          🔄 Pedir actualización
        </button>
      </div>

      <div class="kpi-grid">
        <div class="kpi kpi-mint" data-am-kpi="meetings" onclick="toggleAmDrilldown('meetings')" style="cursor:pointer;transition:all 0.15s;${amDrilldown==='meetings'?'box-shadow:0 0 0 2px var(--mint)':''}" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">
          <div class="kpi-label">🎯 Reuniones agendadas <span style="color:var(--text-mute);font-size:10px">${amDrilldown==='meetings'?'(abierto ▼)':'(click)'}</span></div>
          <div class="kpi-value">${k.meetings || 0}</div>
          <div class="kpi-sub">${totales.seqMeetings || 0} SEQ · ${totales.duoMeetings || 0} DUO</div>
        </div>
        <div class="kpi kpi-cyan" data-am-kpi="replies" onclick="toggleAmDrilldown('replies')" style="cursor:pointer;transition:all 0.15s;${amDrilldown==='replies'?'box-shadow:0 0 0 2px var(--cyan)':''}" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">
          <div class="kpi-label">💬 Respuestas <span style="color:var(--text-mute);font-size:10px">${amDrilldown==='replies'?'(abierto ▼)':'(click)'}</span></div>
          <div class="kpi-value">${k.replies || 0}</div>
          <div class="kpi-sub">${totales.seqReplies || 0} SEQ · ${totales.duoReplies || 0} DUO</div>
        </div>
        <div class="kpi kpi-yellow" data-am-kpi="openplus3" onclick="toggleAmDrilldown('openplus3')" style="cursor:pointer;transition:all 0.15s;${amDrilldown==='openplus3'?'box-shadow:0 0 0 2px var(--yellow)':''}" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">
          <div class="kpi-label">📨 Open+3 (engaged) <span style="color:var(--text-mute);font-size:10px">${amDrilldown==='openplus3'?'(abierto ▼)':'(click)'}</span></div>
          <div class="kpi-value">${fmtNum(k.openPlus3)}</div>
          <div class="kpi-sub">leads en seqs &gt;60% open rate</div>
        </div>
        <div class="kpi kpi-purple" data-am-kpi="duogenerated" onclick="toggleAmDrilldown('duogenerated')" style="cursor:pointer;transition:all 0.15s;${amDrilldown==='duogenerated'?'box-shadow:0 0 0 2px var(--purple)':''}" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">
          <div class="kpi-label">🔮 DUO Generated <span style="color:var(--text-mute);font-size:10px">${amDrilldown==='duogenerated'?'(abierto ▼)':'(click)'}</span></div>
          <div class="kpi-value">${fmtNum(k.duoGenerated)}</div>
          <div class="kpi-sub">${totales.duoSequenced || 0} ya secuenciadas</div>
        </div>
      </div>
    </div>

    <!-- Drilldown inline container -->
    <div id="am-drilldown" style="display:none;margin-bottom:8px"></div>
  `;

  // === COMPARATIVO SEQ vs DUO POR PRODUCTO ===
  h += `
    <div class="section">
      <div class="section-title">🥊 SEQ vs DUO — Comparativo por producto <span class="section-count">${productos.length}</span></div>
      <div style="font-size:12px;color:var(--text-dim);margin-bottom:12px">Reply rate solo es comparable dentro del mismo canal. El ganador se define por reuniones agendadas.</div>
      <div style="overflow-x:auto"><table class="tbl">
        <thead>
          <tr>
            <th rowspan="2" style="vertical-align:bottom">Producto</th>
            <th colspan="5" style="text-align:center;color:var(--mint);border-bottom:1px solid var(--border)">📋 SEQ — Secuencias outbound</th>
            <th colspan="5" style="text-align:center;color:var(--purple);border-bottom:1px solid var(--border)">🔮 DUO — Señales DuoCopilot</th>
            <th rowspan="2" style="vertical-align:bottom;text-align:center">🏆 Ganador</th>
          </tr>
          <tr>
            <th class="num" style="color:var(--mint)">Seqs</th><th class="num" style="color:var(--mint)">Leads</th><th class="num" style="color:var(--mint)">Open%</th><th class="num" style="color:var(--mint)">Reply%</th><th class="num" style="color:var(--mint)">Mtgs</th>
            <th class="num" style="color:var(--purple)">Sigs</th><th class="num" style="color:var(--purple)">Gen</th><th class="num" style="color:var(--purple)">Seq%</th><th class="num" style="color:var(--purple)">Reply%</th><th class="num" style="color:var(--purple)">Mtgs</th>
          </tr>
        </thead>
        <tbody>`;

  productos.forEach(p => {
    const s = p.seq, d = p.duo;
    const g = GANADOR_STYLES[p.ganador] || GANADOR_STYLES['inactivo'];
    h += `<tr>
      <td style="font-weight:700;color:var(--text)">${p.codigo}</td>
      <td class="num">${s.secuencias || 0}</td>
      <td class="num">${fmtNum(s.leads)}</td>
      <td class="num" style="${s.openRate>=0.5&&s.openRate<=1?'color:var(--mint);font-weight:600':''}">${s.leads>0?fmtPct(s.openRate):'—'}</td>
      <td class="num" style="${s.replyRate>=0.02?'color:var(--mint);font-weight:600':s.replyRate<0.005&&s.leads>50?'color:var(--red)':''}">${s.leads>0?fmtPct(s.replyRate):'—'}</td>
      <td class="num" style="${s.meetings>0?'color:var(--mint);font-weight:700':''}">${s.meetings || 0}</td>
      <td class="num">${d.signals || 0}</td>
      <td class="num">${fmtNum(d.generated)}</td>
      <td class="num">${d.generated>0?fmtPct(d.sequenceRate):'—'}</td>
      <td class="num" style="${d.replyRate>=0.02?'color:var(--purple);font-weight:600':''}">${d.sequenced>0?fmtPct(d.replyRate):'—'}</td>
      <td class="num" style="${d.meetings>0?'color:var(--purple);font-weight:700':''}">${d.meetings || 0}</td>
      <td style="text-align:center;color:${g.color};font-weight:600;font-size:12px;white-space:nowrap">${g.icon} ${g.label}</td>
    </tr>`;
  });

  h += `</tbody></table></div></div>`;

  // === ACCIONABLES ===
  const productosConDatos = [...new Set(accionables.map(a => a.producto))].sort();
  
  const filtrados = accionables.filter(a => {
    if (amFilters.canal !== 'todos' && a.canal !== amFilters.canal) return false;
    if (amFilters.tipo !== 'todos' && a.id !== amFilters.tipo) return false;
    if (amFilters.producto !== 'todos' && a.producto !== amFilters.producto) return false;
    return true;
  });

  h += `
    <div class="section">
      <div class="section-title">🎯 Acciones recomendadas <span class="section-count">${filtrados.length}/${accionables.length}</span></div>
      <div style="font-size:12px;color:var(--text-dim);margin-bottom:12px">
        Generadas automáticamente desde el comportamiento de cada secuencia y señal del último mes.
      </div>

      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px">
        ${['celebrar','reforzar','activar','optimizar','pausar'].map(tipo => {
          const cnt = stats.porTipo?.[tipo] || 0;
          const st = ACCION_STYLES[tipo];
          const isActive = tipo === amFilters.tipo;
          return `
            <div onclick="setAmFilter('tipo','${isActive ? 'todos' : tipo}')" 
                 style="background:var(--bg-3);border:1px solid ${isActive ? st.color : 'var(--border)'};border-radius:8px;padding:10px;cursor:pointer;text-align:center;transition:all 0.15s;${isActive ? 'box-shadow:0 0 0 1px ' + st.color : ''}">
              <div style="font-size:18px;font-weight:700;color:${st.color}">${cnt}</div>
              <div style="font-size:11px;font-weight:600;margin-top:2px;color:var(--text-dim)">${st.icon} ${st.cat}</div>
            </div>
          `;
        }).join('')}
      </div>

      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center">
        <span style="font-size:12px;color:var(--text-dim);margin-right:4px">Canal:</span>
        ${['todos','SEQ','DUO'].map(c => `
          <button onclick="setAmFilter('canal','${c}')" class="chip" 
                  style="${c === amFilters.canal ? 'background:var(--purple);color:white;border-color:var(--purple)' : ''}">
            ${c === 'todos' ? 'Todos' : (c === 'SEQ' ? '📋 SEQ' : '🔮 DUO')}
            ${c !== 'todos' ? ` (${stats.porCanal?.[c] || 0})` : ` (${accionables.length})`}
          </button>
        `).join('')}
        <span style="font-size:12px;color:var(--text-dim);margin:0 4px 0 12px">Producto:</span>
        <button onclick="setAmFilter('producto','todos')" class="chip" 
                style="${amFilters.producto === 'todos' ? 'background:var(--purple);color:white;border-color:var(--purple)' : ''}">
          Todos
        </button>
        ${productosConDatos.map(prod => `
          <button onclick="setAmFilter('producto','${prod}')" class="chip" 
                  style="${prod === amFilters.producto ? 'background:var(--purple);color:white;border-color:var(--purple)' : ''}">
            ${prod}
          </button>
        `).join('')}
      </div>
  `;

  if (filtrados.length === 0) {
    h += `<div style="padding:24px;text-align:center;color:var(--text-dim)">Sin acciones que coincidan con los filtros.</div>`;
  } else {
    h += `<table class="tbl">
      <thead>
        <tr><th>Acción</th><th>Canal</th><th>Producto</th><th>Detalle</th></tr>
      </thead>
      <tbody>`;
    filtrados.forEach(a => {
      const st = ACCION_STYLES[a.id] || ACCION_STYLES.optimizar;
      h += `<tr>
        <td style="color:${st.color};font-weight:600;white-space:nowrap">${st.icon} ${st.cat}</td>
        <td style="color:var(--text);font-weight:600">${a.canal === 'SEQ' ? '📋 SEQ' : '🔮 DUO'}</td>
        <td style="color:var(--text);font-weight:700">${a.producto}</td>
        <td style="color:var(--text-dim)">${a.detalle}</td>
      </tr>`;
    });
    h += `</tbody></table>`;
  }
  h += `</div>`;

  // === DETALLE EXPANDIDO POR DEFAULT ===
  h += `
    <div class="section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
        <div class="section-title" style="margin:0">📊 Detalle por secuencia y señal <span class="section-count">${(totales.seqSecuencias || 0) + (totales.duoSignals || 0)}</span></div>
        <div style="display:flex;gap:6px">
          <button class="chip" data-am-detail="sequences" onclick="switchAmDetailViewInPlace('sequences')"
                  style="${amDetailView==='sequences'?'background:var(--purple);color:white;border-color:var(--purple)':''}">📋 Secuencias (${totales.seqSecuencias || 0})</button>
          <button class="chip" data-am-detail="signals" onclick="switchAmDetailViewInPlace('signals')"
                  style="${amDetailView==='signals'?'background:var(--purple);color:white;border-color:var(--purple)':''}">🔮 Señales DUO (${totales.duoSignals || 0})</button>
        </div>
      </div>

      <div id="am-seq-detail" style="display:${amDetailView==='sequences'?'block':'none'}">
        <table class="tbl">
          <thead>
            <tr><th>Producto</th><th>Secuencia</th><th class="num">Leads</th><th class="num">Open%</th><th class="num">Reply%</th><th class="num">Interesados</th><th class="num">Mtgs</th></tr>
          </thead>
          <tbody>`;

  productos.forEach(p => {
    (p.seq.detalle || []).forEach(s => {
      h += `<tr>
        <td style="font-weight:700;color:var(--text)">${p.codigo}</td>
        <td style="font-size:12px;color:var(--text-dim)">${(s.nombre || '').trim()}</td>
        <td class="num">${fmtNum(s.leads)}</td>
        <td class="num" style="${s.openRate>=0.5&&s.openRate<=1?'color:var(--mint);font-weight:600':''}">${s.leads>0?fmtPct(s.openRate):'—'}</td>
        <td class="num" style="${s.replyRate>=0.02?'color:var(--mint);font-weight:600':s.replyRate<0.005&&s.leads>50?'color:var(--red)':''}">${s.leads>0?fmtPct(s.replyRate):'—'}</td>
        <td class="num">${s.interested || 0}</td>
        <td class="num" style="${s.meetings>0?'color:var(--mint);font-weight:700':''}">${s.meetings || 0}</td>
      </tr>`;
    });
  });

  h += `</tbody></table></div>

      <div id="am-duo-detail" style="display:${amDetailView==='signals'?'block':'none'}">
        <table class="tbl">
          <thead>
            <tr><th>Producto</th><th>Señal DUO</th><th class="num">Generated</th><th class="num">Sequenced</th><th class="num">Seq%</th><th class="num">Replies</th><th class="num">Reply%</th><th class="num">Mtgs</th></tr>
          </thead>
          <tbody>`;

  productos.forEach(p => {
    (p.duo.detalle || []).forEach(d => {
      h += `<tr>
        <td style="font-weight:700;color:var(--text)">${p.codigo}</td>
        <td style="font-size:12px;color:var(--text-dim)">${d.signal}</td>
        <td class="num">${fmtNum(d.generated)}</td>
        <td class="num">${fmtNum(d.sequenced)}</td>
        <td class="num">${d.generated>0?fmtPct(d.sequenceRate):'—'}</td>
        <td class="num">${d.replies || 0}</td>
        <td class="num" style="${d.replyRate>=0.02?'color:var(--purple);font-weight:600':''}">${d.sequenced>0?fmtPct(d.replyRate):'—'}</td>
        <td class="num" style="${d.meetings>0?'color:var(--purple);font-weight:700':''}">${d.meetings || 0}</td>
      </tr>`;
    });
  });

  h += `</tbody></table></div>
    </div>
  `;

  $('#p-amplemarket').innerHTML = h;
  
  // Render drilldown if active
  renderAmplemarketDrilldown();
}

function setAmFilter(dim, value) {
  amFilters[dim] = value;
  renderAmplemarket();
}

function switchAmDetailViewInPlace(view) {
  amDetailView = view;
  const seqDiv = document.getElementById('am-seq-detail');
  const duoDiv = document.getElementById('am-duo-detail');
  if (seqDiv) seqDiv.style.display = view === 'sequences' ? 'block' : 'none';
  if (duoDiv) duoDiv.style.display = view === 'signals' ? 'block' : 'none';
  document.querySelectorAll('#p-amplemarket button[data-am-detail]').forEach(btn => {
    const isActive = btn.dataset.amDetail === view;
    btn.style.background = isActive ? 'var(--purple)' : '';
    btn.style.color = isActive ? 'white' : '';
    btn.style.borderColor = isActive ? 'var(--purple)' : '';
  });
}

function refreshAmplemarket() {
  alert('🔄 Para actualizar Amplemarket:\n\n1. Abre el chat con Claude\n2. Escribe: "actualizar Amplemarket"\n3. Claude correrá las queries vía MCP (~1 min)\n4. Recarga este dashboard');
}

async function loadAmData(showLoading) {
  if (showLoading) {
    const container = document.getElementById('p-amplemarket');
    if (container) {
      container.style.opacity = '0.5';
      container.style.pointerEvents = 'none';
    }
  }
  try {
    const r = await fetch(AM_URL + '?period=' + amPeriod);
    if (r.ok) {
      AM_DATA = await r.json();
    }
  } catch (e) {
    console.warn('AM reload failed:', e);
  }
  // reset drilldown when period changes
  amDrilldown = null;
  renderAmplemarket();
  const container = document.getElementById('p-amplemarket');
  if (container) {
    container.style.opacity = '1';
    container.style.pointerEvents = 'auto';
  }
}

function setAmPeriod(days) {
  if (amPeriod === days) return;
  amPeriod = days;
  loadAmData(true);
}


// --- FORECAST ---
function renderForecast() {
  const deals = DATA.deals;
  const propuestas = deals.filter(d => d.stage === 'presentationscheduled');
  const educacion = deals.filter(d => d.stage === 'qualifiedtobuy');
  const atraccion = deals.filter(d => d.stage === 'appointmentscheduled');

  const propTotal = propuestas.reduce((s, d) => s + (d.amount || 0), 0);
  const educTotal = educacion.reduce((s, d) => s + (d.amount || 0), 0);
  const atrTotal = atraccion.reduce((s, d) => s + (d.amount || 0), 0);

  const conservador = propTotal * 0.35;
  const base = conservador + educTotal * 0.20;
  const optimista = base + atrTotal * 0.10;

  // Closes próximos 30 días
  const close30 = deals.filter(d => {
    const days = daysUntil(d.closedate);
    return days !== null && days >= 0 && days <= 30;
  }).sort((a, b) => new Date(a.closedate) - new Date(b.closedate));

  let html = `
    <div class="kpi-grid">
      <div class="kpi kpi-mint">
        <div class="kpi-label">Conservador</div>
        <div class="kpi-value">${fmtK(conservador)}</div>
        <div class="kpi-sub">Propuestas × 35%</div>
      </div>
      <div class="kpi kpi-cyan">
        <div class="kpi-label">Base</div>
        <div class="kpi-value">${fmtK(base)}</div>
        <div class="kpi-sub">+ Educación × 20%</div>
      </div>
      <div class="kpi kpi-purple">
        <div class="kpi-label">Optimista</div>
        <div class="kpi-value">${fmtK(optimista)}</div>
        <div class="kpi-sub">+ Atracción × 10%</div>
      </div>
    </div>
    <div class="section">
      <div class="section-title">Closes próximos 30 días <span class="section-count">${close30.length}</span></div>
      <table class="tbl">
        <thead><tr><th>Deal</th><th>Stage</th><th>Close</th><th>Días</th><th class="num">Monto</th></tr></thead>
        <tbody>
  `;
  if (close30.length === 0) {
    html += `<tr><td colspan="5" class="empty">Sin closes en los próximos 30 días</td></tr>`;
  }
  close30.forEach(d => {
    const days = daysUntil(d.closedate);
    const cls = days <= 7 ? 'urg-row' : (days <= 15 ? 'atn-row' : '');
    html += `<tr class="${cls}">
      <td>${d.name}</td>
      <td>${tagForStage(d.stage, d.stageLabel)}</td>
      <td>${d.closedate}</td>
      <td>${days}d</td>
      <td class="num">${fmt(d.amount)}</td>
    </tr>`;
  });
  html += `</tbody></table></div>`;
  $('#p-forecast').innerHTML = html;
}

// --- INIT ---
function init() {
  $$('.tab').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });
  $('#btn-refresh').addEventListener('click', loadData);
  loadData();
  // Auto-refresh cada 5 minutos
  setInterval(loadData, 5 * 60 * 1000);
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

</script>
</body>
</html>
